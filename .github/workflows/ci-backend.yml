name: CI Backend

on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [main, develop]
    paths: ['backend/**']

env:
  PYTHON_VERSION: '3.12'
  DJANGO_SETTINGS_MODULE: 'config.settings.test'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install ruff
      - name: Run linter
        run: |
          cd backend
          ruff check .
          ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: bargain_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: bargain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements/dev.txt') }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements/dev.txt

      - name: Install GDAL
        run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev

      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate --noinput
        env:
          DATABASE_URL: postgis://bargain_test:test_password@localhost:5432/bargain_test
          REDIS_URL: redis://localhost:6379/0

      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=apps --cov-report=xml --cov-fail-under=80 -v
        env:
          DATABASE_URL: postgis://bargain_test:test_password@localhost:5432/bargain_test
          REDIS_URL: redis://localhost:6379/0

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
