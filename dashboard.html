    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function parseMemoryMarkdown(content) {
      const parsed = {
        title: '',
        fields: {},
        sections: {},
        tables: [],
        rawContent: content
      };

      const lines = content.split('\n');
      let currentSection = '_intro';
      parsed.sections[currentSection] = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.match(/^# /)) {
          parsed.title = line.replace(/^# /, '').trim();
          continue;
        }

        if (line.match(/^## /)) {
          currentSection = line.replace(/^## /, '').trim();
          parsed.sections[currentSection] = [];
          continue;
        }

        const kvMatch = line.match(/^\*\*(.+?):\*\*\s*(.*)$/);
        if (kvMatch) {
          parsed.fields[kvMatch[1]] = kvMatch[2];
          continue;
        }

        parsed.sections[currentSection].push(line);
      }

      for (const key in parsed.sections) {
        parsed.sections[key] = parsed.sections[key].join('\n').trim();
      }

      const tableRegex = /\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)+)/g;
      let match;
      while ((match = tableRegex.exec(content)) !== null) {
        const headers = match[1].split('|').map(h => h.trim()).filter(h => h);
        const rowLines = match[2].trim().split('\n');
        const rows = rowLines.map(row => row.split('|').map(c => c.trim()).filter(c => c));
        parsed.tables.push({ headers, rows });
      }

      return parsed;
    }

    function getPreview(content, maxLength = 150) {
      let preview = content
        .replace(/^#+ .+$/gm, '')
        .replace(/\*\*(.+?):\*\*.*/g, '')
        .replace(/\|.+\|/g, '')
        .replace(/[-=]{3,}/g, '')
        .trim()
        .substring(0, maxLength);
      if (content.length > maxLength) preview += '...';
      return preview;
    }

    function getDisplayName(filename) {
      return filename
        .replace('.md', '')
        .split(/[-_]/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    function isTextFile(name) {
      const lower = name.toLowerCase();
      return [
        '.md', '.txt', '.html', '.svg', '.puml', '.mmd',
        '.json', '.yml', '.yaml', '.csv', '.log'
      ].some(ext => lower.endsWith(ext));
    }

    function ensureMemoryDir(key) {
      if (!memoryData.memoryDirs[key]) {
        memoryData.memoryDirs[key] = [];
      }
    }

    function pushMemoryFile(dirKey, fileName, content, fileHandle = null, dirHandle = null, relativePath = null) {
      ensureMemoryDir(dirKey);
      memoryData.memoryDirs[dirKey].push({
        name: fileName,
        content,
        fileHandle,
        dirHandle,
        relativePath,
        parsed: parseMemoryMarkdown(content)
      });
    }

    function buildMemoryTree() {
      const root = { key: '', folders: {}, files: [] };
      const dirKeys = Object.keys(memoryData.memoryDirs).sort((a, b) => a.localeCompare(b));

      for (const dirKey of dirKeys) {
        const parts = dirKey.split('/').filter(Boolean);
        let node = root;
        let currentKey = '';

        for (const part of parts) {
          currentKey = currentKey ? `${currentKey}/${part}` : part;
          if (!node.folders[part]) {
            node.folders[part] = { key: currentKey, name: part, folders: {}, files: [] };
          }
          node = node.folders[part];
        }

        const files = (memoryData.memoryDirs[dirKey] || []).slice().sort((a, b) => a.name.localeCompare(b.name));
        for (const file of files) {
          node.files.push({ ...file, dirKey, treePath: `${dirKey}/${file.name}` });
        }
      }

      return root;
    }

    function findMemoryFileByPath(path) {
      const idx = path.lastIndexOf('/');
      if (idx === -1) return null;
      const dirKey = path.slice(0, idx);
      const fileName = path.slice(idx + 1);
      const files = memoryData.memoryDirs[dirKey] || [];
      const file = files.find(f => f.name === fileName);
      if (!file) return null;
      return { dirKey, fileName, file };
    }

    function selectFirstMemoryFileIfNeeded() {
      if (selectedMemoryPath) {
        const found = findMemoryFileByPath(selectedMemoryPath);
        if (found) return;
      }

      const dirKeys = Object.keys(memoryData.memoryDirs).sort((a, b) => a.localeCompare(b));
      for (const dirKey of dirKeys) {
        const files = (memoryData.memoryDirs[dirKey] || []).slice().sort((a, b) => a.name.localeCompare(b.name));
        if (files.length > 0) {
          selectedMemoryPath = `${dirKey}/${files[0].name}`;
          return;
        }
      }

      selectedMemoryPath = null;
    }

    function renderMemoryTreeNode(folderNode, depth = 0) {
      const wrapper = document.createElement('div');
      const folderHeader = document.createElement('div');
      folderHeader.className = 'memory-tree-folder-header';
      folderHeader.style.paddingLeft = `${8 + depth * 10}px`;
      const isExpanded = expandedMemoryFolders.has(folderNode.key);
      folderHeader.innerHTML = `
        <span class="memory-tree-caret">${isExpanded ? '▼' : '▶'}</span>
        <span class="memory-tree-icon">📁</span>
        <span>${folderNode.name}</span>
      `;

      folderHeader.addEventListener('click', () => {
        if (expandedMemoryFolders.has(folderNode.key)) {
          expandedMemoryFolders.delete(folderNode.key);
        } else {
          expandedMemoryFolders.add(folderNode.key);
        }
        renderMemoryExplorer();
      });

      wrapper.appendChild(folderHeader);

      if (!isExpanded) return wrapper;

      const children = document.createElement('div');
      children.className = 'memory-tree-children';

      const subFolders = Object.values(folderNode.folders).sort((a, b) => a.name.localeCompare(b.name));
      subFolders.forEach(sub => {
        children.appendChild(renderMemoryTreeNode(sub, depth + 1));
      });

      const files = (folderNode.files || []).slice().sort((a, b) => a.name.localeCompare(b.name));
      files.forEach(file => {
        const row = document.createElement('div');
        row.className = 'memory-tree-file';
        if (selectedMemoryPath === file.treePath) row.classList.add('active');
        row.style.paddingLeft = `${8 + (depth + 1) * 10}px`;
        row.innerHTML = `<span class="memory-tree-caret"></span><span class="memory-tree-icon">📄</span><span>${file.name}</span>`;
        row.addEventListener('click', () => {
          selectedMemoryPath = file.treePath;
          renderMemoryExplorer();
        });
        children.appendChild(row);
      });

      wrapper.appendChild(children);
      return wrapper;
    }

    function renderSelectedMemoryFile() {
      const selected = selectedMemoryPath ? findMemoryFileByPath(selectedMemoryPath) : null;
      if (!selected) {
        memoryContentContainer.innerHTML = '<div class="empty-state" style="padding: 40px;">No documents loaded.</div>';
        return;
      }

      const { dirKey, fileName, file } = selected;
      const canEdit = !!memoryDirHandle && !!file.fileHandle;
      const lowerName = fileName.toLowerCase();
      const isMarkdown = fileName.toLowerCase().endsWith('.md');
      const isHtml = lowerName.endsWith('.html') || lowerName.endsWith('.htm');
      const isImage = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg'].some(ext => lowerName.endsWith(ext));
      const title = `${dirKey}/${fileName}`;

      let contentHtml = '';

      if (isImage && file.relativePath && !IS_FILE_PROTOCOL) {
        contentHtml = `
          <div style="padding: 12px;">
            <img src="${file.relativePath}?t=${Date.now()}" alt="${escapeHtml(fileName)}" style="max-width: 100%; height: auto; border-radius: 8px; border: 1px solid var(--border);" />
          </div>
        `;
      } else if (isHtml && file.relativePath && !IS_FILE_PROTOCOL) {
        contentHtml = `
          <iframe
            src="${file.relativePath}?t=${Date.now()}"
            style="width: 100%; min-height: 78vh; border: 1px solid var(--border); border-radius: 8px; background: white;"
            loading="lazy"
            referrerpolicy="no-referrer"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
          ></iframe>
        `;
      } else if (isMarkdown) {
        contentHtml = `<div class="markdown-content">${renderMarkdownToHtml(file.content)}</div>`;
      } else {
        contentHtml = `<pre style="white-space: pre-wrap; font-size: 13px; color: var(--text-secondary);">${escapeHtml(file.content)}</pre>`;
      }

      memoryContentContainer.innerHTML = `
        <div class="file-card">
          <div class="file-card-header">
            <span class="file-card-title">${escapeHtml(title)}</span>
          </div>
          <div class="file-card-content expanded">${contentHtml}</div>
        </div>
        ${canEdit ? `<button onclick="openFileModal('${dirKey}', '${fileName}')" style="margin-top: 10px;">Edit ${escapeHtml(fileName)}</button>` : ''}
      `;
    }

    function renderMemoryExplorer() {
      selectFirstMemoryFileIfNeeded();
      const tree = buildMemoryTree();
      memoryTreeContainer.innerHTML = '';

      const topFolders = Object.values(tree.folders).sort((a, b) => a.name.localeCompare(b.name));
      if (topFolders.length === 0) {
        memoryTreeContainer.innerHTML = '<div class="empty-state" style="padding: 24px 12px;">No docs loaded.</div>';
        memoryContentContainer.innerHTML = '<div class="empty-state" style="padding: 40px;">Load docs to start browsing.</div>';
        return;
      }

      topFolders.forEach(folder => {
        memoryTreeContainer.appendChild(renderMemoryTreeNode(folder, 0));
      });

      renderSelectedMemoryFile();
    }

    async function collectDirectoryFilesRecursive(dirHandle, folderPrefix = '') {
      const out = [];
      for await (const entry of dirHandle.values()) {
        if (entry.kind === 'file') {
          out.push({
            fileHandle: entry,
            relativePath: folderPrefix ? `${folderPrefix}/${entry.name}` : entry.name
          });
        } else if (entry.kind === 'directory') {
          const nestedPrefix = folderPrefix ? `${folderPrefix}/${entry.name}` : entry.name;
          const nested = await collectDirectoryFilesRecursive(entry, nestedPrefix);
          out.push(...nested);
        }
      }
      return out;
    }

    async function loadMemoryFromFolderHandle(rootHandle) {
      memoryDirHandle = rootHandle;
      memorySource = 'folder';

      memoryData = { claudeMd: null, memoryFiles: [], memoryDirs: {} };

      // docs/memoria (flat)
      try {
        const docsDir = await memoryDirHandle.getDirectoryHandle('docs');
        const memoriaDir = await docsDir.getDirectoryHandle('memoria');
        for await (const entry of memoriaDir.values()) {
          if (entry.kind !== 'file') continue;
          const file = await entry.getFile();
          let content = '';
          if (isTextFile(entry.name)) {
            content = await file.text();
          } else {
            content = `[Binary file] ${entry.name}`;
          }
          pushMemoryFile('memoria', entry.name, content, entry, memoriaDir, `docs/memoria/${entry.name}`);
        }
      } catch (e) { console.log('No docs/memoria found'); }

      // docs/diagramas (recursive)
      try {
        const docsDir = await memoryDirHandle.getDirectoryHandle('docs');
        const diagramasDir = await docsDir.getDirectoryHandle('diagramas');
        const files = await collectDirectoryFilesRecursive(diagramasDir);
        for (const item of files) {
          const pathParts = item.relativePath.split('/');
          const fileName = pathParts[pathParts.length - 1];
          const subFolder = pathParts.length > 1 ? pathParts.slice(0, -1).join('/') : 'root';
          const dirKey = `diagramas/${subFolder}`;
          const fileObj = await item.fileHandle.getFile();
          let content = '';
          if (isTextFile(fileName)) {
            content = await fileObj.text();
          } else {
            content = `[Binary file] ${item.relativePath}`;
          }
          pushMemoryFile(dirKey, fileName, content, item.fileHandle, diagramasDir, `docs/diagramas/${item.relativePath}`);
        }
      } catch (e) { console.log('No docs/diagramas found'); }

      Object.keys(memoryData.memoryDirs).forEach(key => {
        memoryData.memoryDirs[key].sort((a, b) => a.name.localeCompare(b.name));
      });

      renderMemory();
      memoryEmptyState.style.display = 'none';
      memoryMainContent.style.display = 'flex';
      filePathEl.textContent = `${memoryDirHandle.name}/docs`;
    }

    async function loadMemoryDirectory() {
      try {
        const picked = await window.showDirectoryPicker();
        await loadMemoryFromFolderHandle(picked);
        showStatus('Loaded docs from ' + picked.name);

      } catch (e) {
        if (e.name !== 'AbortError') { showStatus('Error: ' + e.message); }
      }
    }

    async function fetchTextIfExists(path) {
      try {
        if (IS_FILE_PROTOCOL) return null;
        const response = await fetch(`${path}?t=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) return null;
        return await response.text();
      } catch {
        return null;
      }
    }

    async function refreshDocs() {
      try {
        if (memorySource === 'folder' && memoryDirHandle) {
          await loadMemoryFromFolderHandle(memoryDirHandle);
          showStatus('Docs refreshed');
          return;
        }

        if (memorySource === 'repo') {
          await loadMemoryFromRepo();
          showStatus('Docs refreshed');
          return;
        }

        await loadMemoryDirectory();
      } catch (e) {
        showStatus('Error: ' + e.message);
      }
    }

    function renderMemoryTabs() {
      let html = '';

      if (memoryData.claudeMd) {
        html += `<button class="memory-tab active" data-tab="overview">Overview</button>`;
      }

      for (const file of memoryData.memoryFiles) {
        const name = file.name.replace('.md', '');
        html += `<button class="memory-tab${!memoryData.claudeMd && memoryData.memoryFiles[0] === file ? ' active' : ''}" data-tab="file-${name}">${name}</button>`;
      }

      for (const dirName of Object.keys(memoryData.memoryDirs).sort()) {
        const files = memoryData.memoryDirs[dirName];
        let count;
        if (dirName === 'context') {
          count = 0;
          for (const file of files) {
            const p = file.parsed;
            count += Object.keys(p.fields).length;
            for (const table of p.tables) {
              count += table.rows.length;
            }
            for (const [sName, sContent] of Object.entries(p.sections)) {
              if (sContent && sName !== '_intro') {
                count += sContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|')).length;
              }
            }
          }
        } else {
          count = files.length;
        }
        html += `<button class="memory-tab" data-tab="dir-${dirName}">${dirName} <span class="count">${count}</span></button>`;
      }

      memoryTabsContainer.innerHTML = html;

      if (!memoryTabsContainer.querySelector('.memory-tab.active')) {
        const first = memoryTabsContainer.querySelector('.memory-tab');
        if (first) first.classList.add('active');
      }

      memoryTabsContainer.querySelectorAll('.memory-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          memoryTabsContainer.querySelectorAll('.memory-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderMemoryContent();
        });
      });
    }

    function renderMemoryContent() {
      const activeTab = memoryTabsContainer.querySelector('.memory-tab.active');
      if (!activeTab) return;

      const tabId = activeTab.dataset.tab;

      if (tabId === 'overview') { renderMemoryOverview(); }
      else if (tabId.startsWith('file-')) {
        const fileName = tabId.replace('file-', '') + '.md';
        renderMemoryFile(fileName);
      } else if (tabId.startsWith('dir-')) {
        const dirName = tabId.replace('dir-', '');
        renderMemoryDirectory(dirName);
      }
    }

    function renderMemoryOverview() {
      if (!memoryData.claudeMd) return;
      const canEdit = !!memoryDirHandle && !!memoryData.claudeMd.fileHandle;

      let statsHtml = '<div class="stats">';
      for (const [dirName, files] of Object.entries(memoryData.memoryDirs)) {
        let count;
        if (dirName === 'context') {
          count = 0;
          for (const file of files) {
            const p = file.parsed;
            count += Object.keys(p.fields).length;
            for (const table of p.tables) { count += table.rows.length; }
            for (const [sName, sContent] of Object.entries(p.sections)) {
              if (sContent && sName !== '_intro') {
                count += sContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|')).length;
              }
            }
          }
        } else {
          count = files.length;
        }
        statsHtml += `
          <div class="stat">
            <div class="stat-value">${count}</div>
            <div class="stat-label">${dirName}</div>
          </div>
        `;
      }
      statsHtml += '</div>';

      const claudeContent = renderMarkdownToHtml(memoryData.claudeMd.content);

      memoryContentContainer.innerHTML = `
        ${statsHtml}
        <div class="file-card">
          <div class="file-card-header" onclick="this.nextElementSibling.classList.toggle('expanded'); this.querySelector('.toggle').textContent = this.nextElementSibling.classList.contains('expanded') ? '\u2212' : '+'">
            <span class="file-card-title">CLAUDE.md</span>
            <span class="toggle" style="color: var(--text-muted);">&minus;</span>
          </div>
          <div class="file-card-content expanded markdown-content">${claudeContent}</div>
        </div>
        ${canEdit ? `<button onclick="openEditModal('CLAUDE.md', 'claudeMd')" style="margin-top: 10px;">Edit CLAUDE.md</button>` : ''}
      `;
    }

    function renderMemoryFile(fileName) {
      const file = memoryData.memoryFiles.find(f => f.name === fileName);
      if (!file) return;
      const canEdit = !!memoryDirHandle && !!file.fileHandle;

      const content = renderMarkdownToHtml(file.content);

      memoryContentContainer.innerHTML = `
        <div class="file-card">
          <div class="file-card-header">
            <span class="file-card-title">${fileName}</span>
          </div>
          <div class="file-card-content expanded markdown-content">${content}</div>
        </div>
        ${canEdit ? `<button onclick="openEditModal('${fileName}', 'memoryFile')" style="margin-top: 10px;">Edit ${fileName}</button>` : ''}
      `;
    }

    function renderMemoryDirectory(dirName) {
      const files = memoryData.memoryDirs[dirName] || [];

      // Context directory uses flat list view
      if (dirName === 'context') {
        renderMemoryDirectoryFlat(dirName, files);
        return;
      }

      // All other directories use card grid view
      let html = `
        <div class="search-box">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search ${dirName}..." id="dirSearch" oninput="filterMemoryDirectory('${dirName}', this.value)">
        </div>
        <div class="memory-grid" id="dirGrid">
      `;

      for (const file of files) {
        const p = file.parsed;
        const title = p.title || getDisplayName(file.name);

        let fieldsHtml = '';
        const fieldEntries = Object.entries(p.fields).slice(0, 3);
        if (fieldEntries.length > 0) {
          fieldsHtml = '<div class="memory-card-fields">';
          for (const [key, value] of fieldEntries) {
            fieldsHtml += `
              <div class="memory-card-field">
                <span class="memory-card-field-label">${escapeHtml(key)}</span>
                <span class="memory-card-field-value">${escapeHtml(value)}</span>
              </div>
            `;
          }
          fieldsHtml += '</div>';
        }

        let preview = '';
        for (const [sectionName, sectionContent] of Object.entries(p.sections)) {
          if (sectionContent && sectionName !== '_intro') {
            preview = getPreview(sectionContent, 100);
            break;
          }
        }
        if (!preview) preview = getPreview(p.rawContent, 100);

        html += `
          <div class="memory-card" onclick="openFileModal('${dirName}', '${file.name}')" data-search="${escapeHtml((title + ' ' + JSON.stringify(p.fields) + ' ' + p.rawContent).toLowerCase())}">
            <div class="memory-card-title">${escapeHtml(title)}</div>
            ${fieldsHtml}
            <div class="memory-card-preview">${escapeHtml(preview)}</div>
          </div>
        `;
      }

      if (memoryDirHandle) {
        html += `
          <div class="add-btn" onclick="openNewFileModal('${dirName}')">
            + Add to ${dirName}
          </div>
        `;
      }
      html += `</div>`;

      memoryContentContainer.innerHTML = html;
    }

    function renderMemoryDirectoryFlat(dirName, files) {
      let html = `
        <div class="search-box">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search ${dirName}..." id="dirSearch" oninput="filterMemoryDirectory('${dirName}', this.value)">
        </div>
        <div id="dirGrid">
      `;

      for (const file of files) {
        const p = file.parsed;

        // Render fields as a key-value table
        const fieldEntries = Object.entries(p.fields);
        if (fieldEntries.length > 0) {
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><tbody>`;
          for (const [key, value] of fieldEntries) {
            html += `<tr data-search="${escapeHtml((key + ' ' + value).toLowerCase())}"><td>${escapeHtml(key)}</td><td>${escapeHtml(value)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Render parsed tables (teams, tools, etc.) as proper HTML tables
        for (const table of p.tables) {
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><thead><tr>`;
          for (const h of table.headers) {
            html += `<th>${escapeHtml(h)}</th>`;
          }
          html += `</tr></thead><tbody>`;
          for (const row of table.rows) {
            const searchData = row.join(' ').toLowerCase();
            html += `<tr data-search="${escapeHtml(searchData)}">`;
            for (const cell of row) {
              html += `<td>${escapeHtml(cell)}</td>`;
            }
            html += `</tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Render non-table section content as list items
        for (const [sectionName, sectionContent] of Object.entries(p.sections)) {
          if (!sectionContent || sectionName === '_intro') continue;
          const lines = sectionContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|'));
          if (lines.length === 0) continue;
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><thead><tr><th colspan="2">${escapeHtml(sectionName)}</th></tr></thead><tbody>`;
          for (const line of lines) {
            const cleanLine = line.replace(/^[-*]\s*/, '').replace(/\*\*(.+?)\*\*/g, '$1').trim();
            if (!cleanLine) continue;
            html += `<tr data-search="${escapeHtml((sectionName + ' ' + cleanLine).toLowerCase())}"><td colspan="2">${escapeHtml(cleanLine)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }
      }

      html += `</div>`;
      memoryContentContainer.innerHTML = html;
    }

    function filterMemoryDirectory(dirName, searchTerm) {
      const grid = document.getElementById('dirGrid');
      const items = grid.querySelectorAll('.memory-card, tr[data-search]');
      const search = searchTerm.toLowerCase();
      items.forEach(item => {
        const searchData = item.dataset.search || '';
        item.style.display = (!search || searchData.includes(search)) ? '' : 'none';
      });
    }

    function renderMarkdownToHtml(md) {
      let html = escapeHtml(md);

      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/```[\s\S]*?```/g, match => {
        const code = match.replace(/```\w*\n?/g, '');
        return '<pre><code>' + code + '</code></pre>';
      });
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/(\|.+\|\n\|[-| ]+\|\n(?:\|.+\|\n?)+)/g, match => {
        const lines = match.trim().split('\n');
        const headers = lines[0].split('|').filter(c => c.trim());
        const rows = lines.slice(2).map(row => row.split('|').filter(c => c.trim()));
        let table = '<table><thead><tr>';
        headers.forEach(h => table += `<th>${h.trim()}</th>`);
        table += '</tr></thead><tbody>';
        rows.forEach(row => {
          table += '<tr>';
          row.forEach(cell => table += `<td>${cell.trim()}</td>`);
          table += '</tr>';
        });
        table += '</tbody></table>';
        return table;
      });
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      html = html.replace(/^(?!<[hupol]|<li|<table|<pre)(.+)$/gm, '<p>$1</p>');
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>\s*<\/p>/g, '');

      return html;
    }

    // Modal functions
    function openFileModal(dirName, fileName) {
      const files = memoryData.memoryDirs[dirName];
      const file = files.find(f => f.name === fileName);
      if (!file) return;

      document.getElementById('modalTitle').textContent = getDisplayName(fileName);
      document.getElementById('modalBody').innerHTML = `
        <div class="markdown-content" style="margin-bottom: 20px;">
          ${renderMarkdownToHtml(file.content)}
        </div>
        <div class="form-group">
          <label>Edit Raw Markdown</label>
          <textarea id="editContent">${escapeHtml(file.content)}</textarea>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = 'dirFile';
      modalOverlay.dataset.dirName = dirName;
      modalOverlay.dataset.fileName = fileName;
    }

    function openNewFileModal(dirName) {
      document.getElementById('modalTitle').textContent = `Add to ${dirName}`;

      let template = '# New Entry\n\n';
      const existingFiles = memoryData.memoryDirs[dirName];
      if (existingFiles && existingFiles.length > 0) {
        const sample = existingFiles[0].parsed;
        for (const key of Object.keys(sample.fields)) {
          template += `**${key}:** \n`;
        }
        template += '\n';
        for (const section of Object.keys(sample.sections)) {
          if (section !== '_intro') {
            template += `## ${section}\n\n`;
          }
        }
      }

      document.getElementById('modalBody').innerHTML = `
        <div class="form-group">
          <label>Filename (without .md)</label>
          <input type="text" id="newFileName" placeholder="my-new-entry" style="width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text-primary); font-size: 14px; font-family: inherit; margin-bottom: 16px;">
        </div>
        <div class="form-group">
          <label>Content</label>
          <textarea id="editContent">${escapeHtml(template)}</textarea>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = 'newDirFile';
      modalOverlay.dataset.dirName = dirName;
    }

    function openEditModal(fileName, type) {
      let content = '';
      if (type === 'claudeMd') {
        content = memoryData.claudeMd.content;
      } else if (type === 'memoryFile') {
        const file = memoryData.memoryFiles.find(f => f.name === fileName);
        if (file) content = file.content;
      }

      document.getElementById('modalTitle').textContent = `Edit ${fileName}`;
      document.getElementById('modalBody').innerHTML = `
        <div class="form-group">
          <label>Content</label>
          <textarea id="editContent" style="min-height: 400px;">${escapeHtml(content)}</textarea>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = type;
      modalOverlay.dataset.fileName = fileName;
    }

    function closeModal() {
      modalOverlay.classList.remove('visible');
    }

    async function saveModal() {
      const type = modalOverlay.dataset.type;
      const content = document.getElementById('editContent').value;

      try {
        if (type === 'claudeMd') {
          if (!memoryData.claudeMd.fileHandle) {
            showStatus('Read-only memory mode');
            return;
          }
          memoryData.claudeMd.content = content;
          const writable = await memoryData.claudeMd.fileHandle.createWritable();
          await writable.write(content);
          await writable.close();
          showStatus('Saved CLAUDE.md');

        } else if (type === 'memoryFile') {
          const fileName = modalOverlay.dataset.fileName;
          const file = memoryData.memoryFiles.find(f => f.name === fileName);
          if (file) {
            if (!file.fileHandle) {
              showStatus('Read-only memory mode');
              return;
            }
            file.content = content;
            const writable = await file.fileHandle.createWritable();
            await writable.write(content);
            await writable.close();
            showStatus('Saved ' + fileName);
          }

        } else if (type === 'dirFile') {
          const dirName = modalOverlay.dataset.dirName;
          const fileName = modalOverlay.dataset.fileName;
          const files = memoryData.memoryDirs[dirName];
          const file = files.find(f => f.name === fileName);
          if (file) {
            if (!file.fileHandle) {
              showStatus('Read-only memory mode');
              return;
            }
            file.content = content;
            file.parsed = parseMemoryMarkdown(content);
            const writable = await file.fileHandle.createWritable();
            await writable.write(content);
            await writable.close();
            showStatus('Saved ' + fileName);
          }

        } else if (type === 'newDirFile') {
          if (!memoryDirHandle) {
            showStatus('Read-only memory mode');
            return;
          }
          const dirName = modalOverlay.dataset.dirName;
          let fileName = document.getElementById('newFileName').value.trim();
          if (!fileName) { showStatus('Please enter a filename'); return; }
          if (!fileName.endsWith('.md')) fileName += '.md';

          const memoryDir = await memoryDirHandle.getDirectoryHandle('memory');
          const subDir = await memoryDir.getDirectoryHandle(dirName, { create: true });
          const fileHandle = await subDir.getFileHandle(fileName, { create: true });

          const writable = await fileHandle.createWritable();
          await writable.write(content);
          await writable.close();

          memoryData.memoryDirs[dirName].push({
            name: fileName,
            content: content,
            fileHandle: fileHandle,
            dirHandle: subDir,
            parsed: parseMemoryMarkdown(content)
          });

          showStatus('Created ' + fileName);
        }

        closeModal();
        renderMemory();

      } catch (e) {
        showStatus('Error saving: ' + e.message);
      }
    }

    // Memory event listeners
    openMemoryBtn.addEventListener('click', loadMemoryDirectory);
    document.getElementById('openMemoryBtnLarge').addEventListener('click', loadMemoryDirectory);
    refreshDocsBtn.addEventListener('click', refreshDocs);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalSave').addEventListener('click', saveModal);

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // Expose functions to onclick handlers
    window.openFileModal = openFileModal;
    window.openNewFileModal = openNewFileModal;
    window.openEditModal = openEditModal;
    window.filterMemoryDirectory = filterMemoryDirectory;

    window.addEventListener('DOMContentLoaded', async () => {
      if (IS_FILE_PROTOCOL) {
        showStatus('Running on file://. Auto-load requires http/https.');
        return;
      }
      await openDefaultTasksFile();
      await loadMemoryFromRepo();
    });
  </script>
</body>
</html>
