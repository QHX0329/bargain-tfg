services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bargain-postgres
    environment:
      POSTGRES_USER: bargain_user
      POSTGRES_PASSWORD: bargain_password
      POSTGRES_DB: bargain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bargain_user -d bargain_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bargain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bargain-backend
    command: python manage.py runserver 0.0.0.0:8000 --noreload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override .env values to use Docker service names instead of localhost
      DATABASE_URL: postgis://bargain_user:bargain_password@postgres:5432/bargain_db
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bargain-celery
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgis://bargain_user:bargain_password@postgres:5432/bargain_db
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bargain-celery-beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgis://bargain_user:bargain_password@postgres:5432/bargain_db
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  graphhopper:
    image: israelhikingmap/graphhopper:latest
    container_name: bargain-graphhopper
    ports:
      - "8989:8989"
    volumes:
      - graphhopper-data:/data
    command: >
      --url https://download.geofabrik.de/europe/spain/andalucia-latest.osm.pbf
      --host 0.0.0.0 --port 8989
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s


volumes:
  postgres_data:
  redis_data:
  graphhopper-data:
