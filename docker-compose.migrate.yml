services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bargain-postgres-migrate
    environment:
      POSTGRES_USER: bargain_user
      POSTGRES_PASSWORD: bargain_password
      POSTGRES_DB: bargain_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bargain_user -d bargain_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bargain-redis-migrate
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bargain-backend-migrate
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgis://bargain_user:bargain_password@postgres:5432/bargain_db
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    external: true
    name: bargain-tfg_postgres_data
  redis_data:
    external: true
    name: bargain-tfg_redis_data
